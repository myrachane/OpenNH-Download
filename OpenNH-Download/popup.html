<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpenNH-Download</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap');

    :root {
      --bg:       #0d0d0f;
      --surface:  #141418;
      --border:   #2a2a35;
      --accent:   #e8175d;
      --accent2:  #ff6b9d;
      --muted:    #555566;
      --text:     #e0e0ec;
      --mono:     'Share Tech Mono', monospace;
      --sans:     'Rajdhani', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 320px;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 14px;
      overflow: hidden;
    }

    /* ─── Header ─── */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 16px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo-dot {
      width: 10px; height: 10px;
      background: var(--accent);
      border-radius: 50%;
      box-shadow: 0 0 8px var(--accent);
      flex-shrink: 0;
    }
    .logo-dot.idle  { background: var(--muted); box-shadow: none; }
    .logo-dot.busy  { animation: pulse 1s infinite; }
    @keyframes pulse {
      0%,100% { box-shadow: 0 0 4px var(--accent); }
      50%      { box-shadow: 0 0 14px var(--accent); }
    }
    .title {
      font-family: var(--sans);
      font-size: 17px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text);
    }
    .title span { color: var(--accent); }
    .version {
      margin-left: auto;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
    }

    /* ─── Body ─── */
    .body { padding: 14px 16px; display: flex; flex-direction: column; gap: 12px; }

    /* ─── Info card ─── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 12px;
    }
    .card-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 4px;
    }
    .card-value {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--accent2);
      word-break: break-all;
    }
    .card-value.big {
      font-size: 20px;
      color: var(--text);
      letter-spacing: 2px;
    }

    .row { display: flex; gap: 10px; }
    .row .card { flex: 1; }

    /* ─── Progress ─── */
    .progress-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 12px;
    }
    .progress-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .progress-label {
      font-size: 10px; font-weight: 600;
      letter-spacing: 2px; text-transform: uppercase;
      color: var(--muted);
    }
    .progress-count {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text);
    }
    .bar-track {
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 2px;
      width: 0%;
      transition: width 0.3s ease;
    }
    .bar-fill.indeterminate {
      width: 40% !important;
      animation: slide 1.2s linear infinite;
    }
    @keyframes slide {
      0%   { transform: translateX(-100%); }
      100% { transform: translateX(300%); }
    }

    /* ─── Status log ─── */
    .log {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      line-height: 1.6;
      min-height: 18px;
      transition: color 0.2s;
    }
    .log.ok    { color: #4ade80; }
    .log.error { color: var(--accent); }
    .log.info  { color: var(--text); }

    /* ─── Buttons ─── */
    .btn {
      width: 100%;
      padding: 11px;
      border: none; border-radius: 6px;
      font-family: var(--sans);
      font-size: 14px; font-weight: 700;
      letter-spacing: 2px; text-transform: uppercase;
      cursor: pointer;
      transition: all 0.15s ease;
    }
    .btn-primary {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 0 18px rgba(232,23,93,0.35);
    }
    .btn-primary:hover:not(:disabled) {
      background: var(--accent2);
      box-shadow: 0 0 28px rgba(255,107,157,0.5);
      transform: translateY(-1px);
    }
    .btn-primary:disabled {
      background: var(--border);
      color: var(--muted);
      box-shadow: none;
      cursor: not-allowed;
    }
    .btn-cancel {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
    }
    .btn-cancel:hover { color: var(--text); border-color: var(--muted); }

    /* ─── Error / warning state ─── */
    .alert {
      background: rgba(232,23,93,0.1);
      border: 1px solid rgba(232,23,93,0.35);
      border-radius: 6px;
      padding: 10px 12px;
      font-size: 12px;
      color: var(--accent2);
      line-height: 1.5;
    }

    /* ─── Footer ─── */
    .footer {
      border-top: 1px solid var(--border);
      padding: 8px 16px;
      font-size: 10px;
      font-family: var(--mono);
      color: var(--muted);
      text-align: center;
      letter-spacing: 1px;
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="logo-dot idle" id="dot"></div>
    <div class="title">Open<span>NH</span>-Download</div>
    <div class="version">v1.0.0</div>
  </div>

  <div class="body">

    <!-- Wrong site or no URL matched -->
    <div id="view-error" class="hidden">
      <div class="alert" id="error-msg"></div>
    </div>

    <!-- Ready state -->
    <div id="view-ready" class="hidden">
      <div class="row">
        <div class="card">
          <div class="card-label">Gallery ID</div>
          <div class="card-value big" id="code-display">—</div>
        </div>
        <div class="card">
          <div class="card-label">Start #</div>
          <div class="card-value big" id="start-display">—</div>
        </div>
      </div>
      <div class="card">
        <div class="card-label">Base URL</div>
        <div class="card-value" id="base-display">—</div>
      </div>
      <button class="btn btn-primary" id="btn-download">⬇ Download ZIP</button>
    </div>

    <!-- Downloading state -->
    <div id="view-progress" class="hidden">
      <div class="progress-wrap">
        <div class="progress-header">
          <div class="progress-label">Downloading</div>
          <div class="progress-count" id="count-display">0 / ?</div>
        </div>
        <div class="bar-track">
          <div class="bar-fill indeterminate" id="bar"></div>
        </div>
      </div>
      <div class="log info" id="log-msg">Starting…</div>
      <button class="btn btn-cancel" id="btn-cancel">✕ Cancel</button>
    </div>

    <!-- Done state -->
    <div id="view-done" class="hidden">
      <div class="card">
        <div class="card-label">Complete</div>
        <div class="card-value" id="done-msg"></div>
      </div>
      <div class="log ok" id="done-size"></div>
      <button class="btn btn-primary" id="btn-again">↺ Download Another</button>
    </div>

  </div>

  <div class="footer">only works on nhentai.net image pages</div>

  <script src="zipper.js"></script>
  <script src="popup.js"></script>
</body>
</html>

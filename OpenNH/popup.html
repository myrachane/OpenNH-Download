<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>OpenNH-Download</title>
<style>
:root{
  --bg:#09090b;--s1:#111114;--s2:#18181c;
  --b1:#222228;--b2:#303038;
  --t0:#f4f4f5;--t1:#a1a1aa;--t2:#52525b;
  --acc:#ef4444;--acc2:#f87171;
  --grn:#22c55e;
  --mono:'Courier New',monospace;--sans:system-ui,sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{width:300px;background:var(--bg);color:var(--t0);
  font-family:var(--sans);font-size:13px}

/* Header — always visible */
.hdr{
  background:var(--s1);border-bottom:1px solid var(--b1);
  padding:10px 14px;display:flex;align-items:center;justify-content:space-between;
}
.logo{font-family:var(--mono);font-size:12px;font-weight:700;
  letter-spacing:.5px;color:var(--t0)}
.logo b{color:var(--acc)}
.dash-btn{
  font-family:var(--mono);font-size:10px;letter-spacing:1.5px;
  padding:5px 11px;border:1px solid var(--b2);border-radius:4px;
  background:none;color:var(--t1);cursor:pointer;text-transform:uppercase;
  transition:all .12s;
}
.dash-btn:hover{color:var(--t0);border-color:var(--t2)}

/* Body */
.body{padding:12px 14px;display:flex;flex-direction:column;gap:10px}

/* Cards */
.row{display:flex;gap:8px}
.card{background:var(--s1);border:1px solid var(--b1);border-radius:4px;
  padding:9px 11px;flex:1}
.card-lbl{font-family:var(--mono);font-size:9px;letter-spacing:2px;
  text-transform:uppercase;color:var(--t2);margin-bottom:4px}
.card-val{font-family:var(--mono);font-size:12px;color:#f87171;
  word-break:break-all;line-height:1.4}
.card-val.big{font-size:22px;color:var(--t0);letter-spacing:-.02em}

/* Progress */
.prog-wrap{background:var(--s1);border:1px solid var(--b1);border-radius:4px;padding:11px}
.prog-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.prog-lbl{font-family:var(--mono);font-size:9px;letter-spacing:2px;
  text-transform:uppercase;color:var(--t2)}
.prog-n{font-family:var(--mono);font-size:11px;color:var(--t1)}
.track{height:2px;background:var(--b1);border-radius:2px;overflow:hidden}
.fill{height:100%;background:linear-gradient(90deg,var(--acc),var(--acc2));
  border-radius:2px;width:0;transition:width .3s ease}
.fill.ind{width:35%!important;animation:slide 1.1s linear infinite}
@keyframes slide{0%{transform:translateX(-200%)}100%{transform:translateX(500%)}}

/* Log */
.log{font-family:var(--mono);font-size:10px;color:var(--t2);line-height:1.6;min-height:16px}
.log.ok{color:var(--grn)}.log.err{color:var(--acc)}.log.inf{color:var(--t1)}

/* Buttons */
.btn{width:100%;padding:9px;border:none;border-radius:4px;
  font-family:var(--sans);font-size:12px;font-weight:600;letter-spacing:.8px;
  text-transform:uppercase;cursor:pointer;transition:all .12s}
.btn-p{background:var(--acc);color:#fff}
.btn-p:hover{background:var(--acc2)}
.btn-p:disabled{background:var(--b1);color:var(--t2);cursor:not-allowed}
.btn-g{background:transparent;color:var(--t1);border:1px solid var(--b1)}
.btn-g:hover{color:var(--t0);border-color:var(--b2)}

/* Alert */
.alert{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);
  border-radius:4px;padding:10px 12px;font-size:12px;color:#f87171;
  line-height:1.6;white-space:pre-line}
.alert.neutral{background:var(--s1);border-color:var(--b1);color:var(--t1)}

/* Done */
.done-val{font-family:var(--mono);font-size:12px;color:#f87171}
.done-sub{font-family:var(--mono);font-size:11px;color:var(--grn)}

.footer{border-top:1px solid var(--b1);padding:6px 14px;
  font-family:var(--mono);font-size:9px;color:var(--t2);letter-spacing:.5px}
.hidden{display:none!important}
</style>
</head>
<body>

<div class="hdr">
  <div class="logo">Open<b>NH</b></div>
  <button class="dash-btn" id="btn-dashboard">Dashboard</button>
</div>

<div class="body">

  <div id="view-offsite" class="hidden">
    <div class="alert neutral">Not on nhentai.net.\nNavigate to a gallery reader page to download.</div>
  </div>

  <div id="view-ready" class="hidden">
    <div class="row">
      <div class="card">
        <div class="card-lbl">Gallery</div>
        <div class="card-val big" id="code-display">—</div>
      </div>
      <div class="card" style="flex:2">
        <div class="card-lbl">Title</div>
        <div class="card-val" id="start-display" style="color:var(--t1);font-size:11px">—</div>
      </div>
    </div>
    <div class="card">
      <div class="card-lbl">Image Server</div>
      <div class="card-val" id="base-display">—</div>
    </div>
    <button class="btn btn-p" id="btn-download">⬇ Download ZIP</button>
  </div>

  <div id="view-progress" class="hidden">
    <div class="prog-wrap">
      <div class="prog-top">
        <span class="prog-lbl">Downloading</span>
        <span class="prog-n" id="count-display">0</span>
      </div>
      <div class="track"><div class="fill ind" id="bar"></div></div>
    </div>
    <div class="log inf" id="log-msg">Starting…</div>
    <button class="btn btn-g" id="btn-cancel">✕ Cancel</button>
  </div>

  <div id="view-done" class="hidden">
    <div class="card">
      <div class="card-lbl">Saved</div>
      <div class="done-val" id="done-msg">—</div>
    </div>
    <div class="done-sub" id="done-size"></div>
    <button class="btn btn-g" id="btn-again">↺ Download Another</button>
  </div>

  <div id="view-error" class="hidden">
    <div class="alert" id="error-msg"></div>
  </div>

</div>

<div class="footer">nhentai.net reader pages only</div>

<script src="zipper.js"></script>
<script src="popup.js"></script>
</body>
</html>
